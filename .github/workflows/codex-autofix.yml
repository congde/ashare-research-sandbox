name: Courseware Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'Makefile'
      - 'docs/**'
      - 'labs/**'
      - 'skills/**'
      - 'scripts/**'
      - 'requirements.txt'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify executable courseware
        run: make check
