name: Codex Autofix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'app/**'
      - 'challenges/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Run tests
        id: test
        run: pytest app/tests -q
        continue-on-error: true

      - name: Codex exec fix (dry-run template)
        if: steps.test.outcome == 'failure'
        run: |
          echo "→ 此处接入: codex exec -a never '修复 pytest 失败，验收: make test'"
          echo "→ 需配置 CODEX_API_KEY secret，本模板默认 dry-run"
          bash scripts/codex-exec-fix.sh --dry-run

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1
