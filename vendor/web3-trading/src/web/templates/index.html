        // 还原历史会话的函数 - 使用优化的流式API
        async function restoreSessionHistory(sessionId) {
            try {
                // 清空当前聊天框
                chatBox.innerHTML = '';
                
                // 显示加载指示器
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'loading-indicator';
                loadingDiv.innerHTML = `
                    <div>
                        <span class="loading-text">${selectedLanguageCode === 'zh_cn' ? '正在加载历史对话' : 'Loading chat history'}</span>
                        <span class="loading-dots">
                            <span>.</span><span>.</span><span>.</span>
                        </span>
                        <div class="loading-progress" style="margin-top: 10px; font-size: 0.9em; color: #666;"></div>
                    </div>
                `;
                chatBox.appendChild(loadingDiv);
                
                // 使用优化的流式历史记录API
                const response = await fetch(`/api/history/stream?session_id=${sessionId}`);
                
                if (!response.ok) {
                    throw new Error(`Failed to load session: ${response.status}`);
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                
                // 处理历史记录的状态
                let messageCount = 0;
                let processedMessages = 0;
                let currentMessage = null;
                let currentContent = '';
                
                // 处理流式数据
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const eventData = JSON.parse(line.slice(6));
                                await processHistoryEvent(eventData);
                            } catch (error) {
                                console.warn('Failed to parse history event:', line, error);
                            }
                        }
                    }
                }
                
                // 处理历史记录事件
                async function processHistoryEvent(event) {
                    const progressDiv = loadingDiv.querySelector('.loading-progress');
                    
                    switch (event.type) {
                        case 'history_start':
                            messageCount = event.data.message_count;
                            if (messageCount === 0) {
                                loadingDiv.remove();
                                await loadWelcomeContent();
                                return;
                            }
                            if (progressDiv) {
                                progressDiv.textContent = `${selectedLanguageCode === 'zh_cn' ? '准备恢复' : 'Preparing to restore'} ${messageCount} ${selectedLanguageCode === 'zh_cn' ? '条消息' : 'messages'}`;
                            }
                            break;
                            
                        case 'message_start':
                            processedMessages = event.data.index + 1;
                            if (progressDiv) {
                                progressDiv.textContent = `${currentLanguage === 'zh' ? '正在处理第' : 'Processing message'} ${processedMessages}/${messageCount} ${currentLanguage === 'zh' ? '条消息' : ''}`;
                            }
                            
                            if (event.data.role === 'user') {
                                currentMessage = null; // 用户消息不需要特殊处理
                            } else {
                                // 为助手消息创建消息泡泡
                                currentMessage = addMessage('assistant', '', true);
                                currentContent = '';
                            }
                            break;
                            
                        case 'user_message':
                            // 直接添加用户消息
                            addMessage('user', event.data, false);
                            smartScroll({ throttle: true });
                            break;
                            
                        case 'thinking_complete':
                            // 添加完整的思考过程
                            if (currentMessage && event.data && event.data.length > 0) {
                                const thinkingContainer = createThinkingProcessContainer();
                                const thinkingContent = thinkingContainer.querySelector('.thinking-process-content');
                                
                                event.data.forEach((step, index) => {
                                    if (step.trim()) {
                                        const stepDiv = document.createElement('div');
                                        stepDiv.classList.add('thinking-step');
                                        
                                        // 创建标题元素
                                        const stepTitle = document.createElement('div');
                                        stepTitle.classList.add('thinking-step-title');
                                        
                                        // 创建内容元素
                                        const stepContent = document.createElement('div');
                                        stepContent.classList.add('thinking-step-content');
                                        
                                        // 将标题和内容添加到步骤元素中
                                        stepDiv.appendChild(stepTitle);
                                        stepDiv.appendChild(stepContent);
                                        
                                        // 处理步骤内容，将换行符转换为HTML
                                        stepContent.innerHTML = step.replace(/\n/g, '<br>');
                                        
                                        thinkingContent.appendChild(stepDiv);
                                    }
                                });
                            }
                            break;
                            
                        case 'text_chunk':
                            // 快速添加文本块
                            if (currentMessage) {
                                currentContent += event.data;
                                const textContentDiv = currentMessage.querySelector('.bubble-content-text');
                                if (textContentDiv) {
                                    textContentDiv.textContent = currentContent;
                                    
                                    // 如果是最后一个块，处理Markdown和引用
                                    if (event.is_final_chunk) {
                                        const htmlContent = DOMPurify.sanitize(marked.parse(currentContent));
                                        textContentDiv.innerHTML = htmlContent;
                                        applyCitationStyling(textContentDiv);
                                    }
                                }
                                smartScroll({ throttle: true });
                            }
                            break;
                            
                        case 'citations':
                            // 添加引用
                            if (event.data && Array.isArray(event.data)) {
                                event.data.forEach(citation => {
                                    if (citation.index && citation.url) {
                                        addFootnote(citation.index, citation.url);
                                    }
                                });
                                smartScroll({ throttle: true });
                            }
                            break;
                            
                        case 'follow_up_questions':
                            // 添加相关问题
                            if (event.data && event.data.length > 0) {
                                addFollowUpQuestions(event.data, currentLanguage);
                                smartScroll({ throttle: true });
                            }
                            break;
                            
                        case 'message_complete':
                            // 完成当前消息
                            if (currentMessage) {
                                finalizeAssistantMessage();
                                currentMessage = null;
                            }
                            break;
                            
                        case 'history_complete':
                            // 历史记录恢复完成
                            loadingDiv.remove();
                            console.log(`History restoration completed: ${event.data.message_count} messages`);
                            smartScroll({ force: true, delay: 300 });
                            break;
                            
                        case 'error':
                            throw new Error(event.data);
                    }
                }
                
            } catch (error) {
                console.error('Error restoring session history:', error);
                
                // 移除加载指示器
                const loadingIndicators = document.querySelectorAll('.loading-indicator');
                loadingIndicators.forEach(indicator => indicator.remove());
                
                // 显示错误消息并加载欢迎内容
                const errorMessage = currentLanguage === 'zh' 
                    ? '无法加载历史对话，已为您创建新对话。'
                    : 'Failed to load chat history. Starting a new conversation.';
                addMessage('assistant', errorMessage, false);
                
                // 重置会话ID
                sessionId = null;
                
                // 延迟后加载欢迎内容
                setTimeout(() => {
                    loadWelcomeContent();
                }, 1000);
            }
        }
