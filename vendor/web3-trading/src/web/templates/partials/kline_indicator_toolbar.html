<div class="kline-indicator-toolbar">
    <div class="kline-indicator-group">
        <span class="kline-indicator-label">主图指标</span>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="ma20" checked><span>MA20</span></label>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="ma60" checked><span>MA60</span></label>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="boll" checked><span>BOLL</span></label>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="volume" checked><span>成交量</span></label>
    </div>
    <div class="kline-indicator-group">
        <span class="kline-indicator-label">叠加指标</span>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="macd" checked><span>MACD</span></label>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="rsi" checked><span>RSI</span></label>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="kdj" checked><span>KDJ</span></label>
    </div>
    <div class="kline-indicator-group">
        <span class="kline-indicator-label">交易计划</span>
        <label class="kline-ind-toggle"><input type="checkbox" data-ind="tradePlan" checked><span>显示价位线</span></label>
    </div>
</div>
