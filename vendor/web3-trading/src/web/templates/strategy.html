<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易策略</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260605dark">
    <link rel="stylesheet" href="/static/strategy.css?v=20260605v2">
</head>
<body>
    <div class="dashboard-page strategy-page">
        <header class="dashboard-header strategy-header">
            <div>
                <h1>交易策略</h1>
                <p>聚合币种基础信息、K线结构与 LLM 信号分析，统一基于 USDT 交易对</p>
            </div>
            <div class="dashboard-actions strategy-header-actions">
                <label class="auto-refresh-toggle" title="开启后每10秒自动刷新币种信息和K线（不触发LLM信号分析）">
                    <input type="checkbox" id="autoRefreshToggle">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">定时刷新</span>
                </label>
                <a href="/dashboard" class="btn btn-secondary">返回看板</a>
            </div>
        </header>

        <section class="filter-panel strategy-filter-panel">
            <div class="filter-item">
                <label for="strategySymbolInput">币种</label>
                <input id="strategySymbolInput" type="text" placeholder="输入 BTC / SOL / BTC-USDT">
            </div>
            <div class="filter-item">
                <label for="strategyKlineTypeSelect">K线周期（仅K线）</label>
                <select id="strategyKlineTypeSelect">
                    <option value="15min">15m</option>
                    <option value="1hour" selected>1h</option>
                    <option value="4hour">4h</option>
                    <option value="1day">1d</option>
                </select>
            </div>
            <div class="filter-item">
                <label for="strategyModelSelect">LLM 模型</label>
                <select id="strategyModelSelect">
                    <option value="deepseek/deepseek-v4-flash">DeepSeek V4 Flash</option>
                    <option value="deepseek/deepseek-v4-pro" selected>DeepSeek V4 Pro</option>
                    <option value="qwen/Qwen3.5-27B">Qwen 3.5 27B</option>
                    <option value="deepseek/deepseek-reasoner">DeepSeek Reasoner</option>
                </select>
            </div>
            <div class="filter-item strategy-filter-apply">
                <label>&nbsp;</label>
                <button id="applyStrategyBtn" class="btn btn-secondary">更新币种</button>
            </div>
        </section>

        <section class="stats-grid" id="strategyBaseInfo">
            <article class="stats-card"><h3>当前币种</h3><p>-</p></article>
            <article class="stats-card"><h3>最新价格</h3><p>-</p></article>
            <article class="stats-card"><h3>24h 涨跌</h3><p>-</p></article>
            <article class="stats-card"><h3>24h 高低</h3><p>-</p></article>
            <article class="stats-card"><h3>24h 成交额</h3><p>-</p></article>
            <article class="stats-card"><h3>交易对</h3><p>-</p></article>
        </section>

        <section class="strategy-kline-section">
            <div class="table-toolbar">
                <div class="signal-title-row">
                    <h2>币种 K 线</h2>
                    <span id="strategyPairLabel" class="signal-symbol-label">BTC-USDT</span>
                </div>
            </div>
            {% include 'partials/kline_indicator_toolbar.html' %}
            <article class="kline-section strategy-kline-main">
                <div id="strategyKlineChart" class="kline-chart"></div>
                <div id="strategyKlineChartHint" class="kline-chart-hint">加载 K 线数据中...</div>
            </article>
            <div id="strategyKlineLegend" class="strategy-kline-legend"></div>
            <div class="strategy-kline-bottom">
                <div id="strategyKlineMetrics" class="signal-grid signal-grid-3 strategy-kline-metrics"></div>
                <div id="strategyKlineVerdict" class="analysis-output strategy-kline-verdict">等待 K 线分析...</div>
            </div>
        </section>

        <section class="signal-analysis-section strategy-signal-section">
            <div class="table-toolbar">
                <div class="signal-title-row">
                    <h2>LLM 信号分析</h2>
                    <span id="strategySignalSymbolLabel" class="signal-symbol-label">BTC</span>
                    <span id="strategySignalBadge" class="signal-badge signal-neutral">分析中</span>
                </div>
                <div class="table-actions strategy-model-tag-wrap">
                    <span id="strategyModelTag" class="strategy-model-tag">Qwen 3.5 27B</span>
                    <button id="generateSignalBtn" class="btn btn-primary btn-sm">生产信号</button>
                    <label class="signal-refresh-toggle" title="每隔 5 分钟自动触发一次信号分析">
                        <input type="checkbox" id="signalRefreshToggle">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">定时刷新</span>
                        <span id="signalRefreshCountdown" class="signal-refresh-countdown"></span>
                    </label>
                </div>
            </div>
            <div id="strategySignalContent" class="signal-content strategy-signal-content">
                <div class="signal-loading">正在分析 LLM 信号...</div>
            </div>
        </section>
    </div>

    {% include 'partials/chart_assets.html' %}
    <script src="/static/dashboard-utils.js?v=20260605v2"></script>
    <script src="/static/strategy.js?v=20260605v5"></script>
</body>
</html>
