# SEO FAQ Generator Workflow
# Enable this workflow
enable: true

enable_tools: true
available_tools:
  - retrieve_fundamental_events
  - get_crypto_investment_outlook
  - coin_screener
  - web_search

# Query parse prompt
query_parse_prompt:
  name: seo_faq_generator_query_parse_prompt
  template: >-
    Extract and organize the article information from the user's input, including article title, content, keywords, and other relevant details. Output a clear, structured query statement for subsequent tool invocation.

# Tool planning prompt
plan_prompt:
  name: seo_faq_generator_plan_prompt
  template: >-
    You are a senior task planner. Based on the user's query, select appropriate tools to complete the task and provide calling parameters.

# Synthesis prompt
synthesize_prompt:
  name: seo_faq_generator_synthesize_prompt
  template: >-
    You are a senior content editor. Based on the tool invocation results, write FAQ content that is professional, accurate, in-depth, and optimized for SEO.
