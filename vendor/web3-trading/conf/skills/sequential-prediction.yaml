## 6. Production Deployment Patterns

### 6.1 Batch Inference Pipeline

```python
import numpy as np
from typing import Any


def batch_forecast(
    model: Any,
    series_list: list[np.ndarray],
    horizon: int,
    batch_size: int = 64,
) -> tuple[list[np.ndarray], list[np.ndarray]]:
    """Process thousands of series efficiently in batches."""
    all_point = []
    all_quantile = []

    for i in range(0, len(series_list), batch_size):
        batch = series_list[i:i + batch_size]
        point_fc, quantile_fc = model.forecast(horizon=horizon, inputs=batch)
        all_point.extend([point_fc[j] for j in range(len(batch))])
        all_quantile.extend([quantile_fc[j] for j in range(len(batch))])

    return all_point, all_quantile
```

### 6.2 Serving Architecture Decision

| Approach | Latency | Throughput | Complexity | Best For |
|----------|---------|------------|------------|----------|
| Direct PyTorch | Medium | Medium | Low | Development, prototyping |
| TorchServe / Triton | Low | High | Medium | Production REST APIs |
| ONNX Runtime | Lowest | High | Medium | Edge/CPU deployment |
| Batch job (Airflow) | N/A | Highest | Low | Scheduled daily/weekly forecasting |
| Ray Serve | Low | Very High | High | Multi-model, auto-scaling |

### 6.3 ONNX Export and Quantized Deployment

```python
import torch
import numpy as np


def export_to_onnx(
    model: torch.nn.Module,
    dummy_input: torch.Tensor,
    output_path: str = "forecast_model.onnx",
    opset_version: int = 17,
) -> str:
    """Export a PyTorch forecast model to ONNX format."""
    model.eval()
    torch.onnx.export(
        model,
        dummy_input,
        output_path,
        opset_version=opset_version,
        input_names=["input_series"],
        output_names=["forecast"],
        dynamic_axes={
            "input_series": {0: "batch_size", 1: "context_length"},
            "forecast": {0: "batch_size", 1: "horizon"},
        },
    )
    return output_path


def quantize_onnx_model(
    model_path: str,
    output_path: str = "forecast_model_int8.onnx",
) -> str:
    """INT8 dynamic quantization for CPU deployment."""
    from onnxruntime.quantization import quantize_dynamic, QuantType

    quantize_dynamic(
        model_input=model_path,
        model_output=output_path,
        weight_type=QuantType.QInt8,
    )
    return output_path


def onnx_inference(
    model_path: str,
    input_series: np.ndarray,
    use_gpu: bool = False,
) -> np.ndarray:
    """Run inference with ONNX Runtime — CPU or GPU."""
    import onnxruntime as ort

    providers = ["CUDAExecutionProvider", "CPUExecutionProvider"] if use_gpu else ["CPUExecutionProvider"]
    session = ort.InferenceSession(model_path, providers=providers)

    input_name = session.get_inputs()[0].name
    result = session.run(None, {input_name: input_series.astype(np.float32)})
    return result[0]


# Full deployment pipeline:
# 1. Export:   export_to_onnx(model, dummy) → forecast_model.onnx
# 2. Quantize: quantize_onnx_model("forecast_model.onnx") → forecast_model_int8.onnx
# 3. Serve:    onnx_inference("forecast_model_int8.onnx", series) → predictions
# Typical speedup: 2-4x on CPU, ~40% model size reduction
```

