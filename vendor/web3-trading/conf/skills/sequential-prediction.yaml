### 3.5 Prophet: Classical Baseline

Always benchmark foundation models against a strong classical baseline. Prophet is the most accessible:

```python
from prophet import Prophet
import pandas as pd
import numpy as np


def prophet_baseline(
    ts: pd.Series,
    horizon: int,
    yearly_seasonality: bool = True,
    weekly_seasonality: bool = True,
    daily_seasonality: bool = False,
) -> tuple[np.ndarray, np.ndarray, np.ndarray]:
    """Prophet baseline forecast. Returns (point, lower_80, upper_80)."""
    df = pd.DataFrame({"ds": ts.index, "y": ts.values})

    model = Prophet(
        yearly_seasonality=yearly_seasonality,
        weekly_seasonality=weekly_seasonality,
        daily_seasonality=daily_seasonality,
        interval_width=0.8,
    )
    model.fit(df)

    future = model.make_future_dataframe(periods=horizon, freq=ts.index.freq)
    forecast = model.predict(future)

    point = forecast["yhat"].iloc[-horizon:].values
    lower = forecast["yhat_lower"].iloc[-horizon:].values
    upper = forecast["yhat_upper"].iloc[-horizon:].values
    return point, lower, upper


def compare_with_baseline(
    series: np.ndarray,
    ts_index: pd.DatetimeIndex,
    foundation_forecast: np.ndarray,
    horizon: int,
) -> dict[str, float]:
    """Compare foundation model against Prophet baseline."""
    ts = pd.Series(series[:-horizon], index=ts_index[:-horizon])
    actual = series[-horizon:]

    prophet_point, _, _ = prophet_baseline(ts, horizon)

    from scipy import stats as sp_stats
    fm_errors = np.abs(actual - foundation_forecast)
    prophet_errors = np.abs(actual - prophet_point)

    return {
        "foundation_mae": np.mean(fm_errors),
        "prophet_mae": np.mean(prophet_errors),
        "improvement_pct": (np.mean(prophet_errors) - np.mean(fm_errors)) / np.mean(prophet_errors) * 100,
        "fm_wins": int(np.sum(fm_errors < prophet_errors)),
        "prophet_wins": int(np.sum(prophet_errors < fm_errors)),
    }
```

### 3.6 Fine-Tuning Decision Framework

| Scenario | Recommendation | Rationale |
|----------|---------------|-----------|
| General benchmarking | Zero-shot | Fair comparison, no data leakage risk |
| Domain-specific deployment | Light fine-tune (LoRA or last layers) | Adapts to domain without catastrophic forgetting |
| Single high-value series | Full fine-tune on augmented data | Maximum accuracy when data is sufficient |
| Resource-constrained | Zero-shot + post-hoc calibration | No GPU budget for fine-tuning |
| Very short series (<50 points) | Zero-shot (foundation model shines here) | Classical methods need more history |
| Thousands of related series | Fine-tune on all, infer per series | Shared patterns across series boost each other |

### 3.7 Hyperparameter Search with Optuna

Foundation models have key hyperparameters (context length, quantile config, etc.) that affect performance. Use Optuna for systematic search:

```python
import optuna
import numpy as np


def optimize_forecast_config(
    model,
    train_series: np.ndarray,
    val_series: np.ndarray,
    horizon: int,
    n_trials: int = 50,
) -> dict:
    """Optimize forecast configuration using Optuna."""

    def objective(trial: optuna.Trial) -> float:
        max_context = trial.suggest_categorical("max_context", [256, 512, 1024, 2048])
        normalize = trial.suggest_categorical("normalize_inputs", [True, False])
        flip_invariance = trial.suggest_categorical("force_flip_invariance", [True, False])
        use_quantile_head = trial.suggest_categorical("use_continuous_quantile_head", [True, False])

        import timesfm
        config = timesfm.ForecastConfig(
            max_context=max_context,
            max_horizon=horizon,
            normalize_inputs=normalize,
            force_flip_invariance=flip_invariance,
            use_continuous_quantile_head=use_quantile_head,
            infer_is_positive=True,
            fix_quantile_crossing=True,
        )
        model.compile(config)

        context = train_series[-max_context:]
        point_fc, _ = model.forecast(horizon=horizon, inputs=[context])
        actual = val_series[:horizon]
        mae = np.mean(np.abs(actual - point_fc[0]))
        return mae

    study = optuna.create_study(direction="minimize", study_name="timesfm_config")
    study.optimize(objective, n_trials=n_trials, show_progress_bar=True)

    return {
        "best_params": study.best_params,
        "best_mae": study.best_value,
        "study": study,
    }


# Visualize optimization results
def plot_optuna_results(study: optuna.Study) -> None:
    """Plot hyperparameter importance and optimization history."""
    from optuna.visualization import (
        plot_optimization_history,
        plot_param_importances,
        plot_slice,
    )
    plot_optimization_history(study).show()
    plot_param_importances(study).show()
    plot_slice(study).show()
```

### 3.8 Hybrid: Foundation Model + Gradient Boosting Residuals

When covariates are important but the foundation model doesn't support them natively:

```python
import lightgbm as lgb

def hybrid_forecast(
    model,
    series: np.ndarray,
    covariate_df: pd.DataFrame,
    horizon: int,
) -> np.ndarray:
    """Foundation model base forecast + LightGBM residual correction."""
    # Step 1: Foundation model point forecast
    point_fc, _ = model.forecast(horizon=horizon, inputs=[series])
    base_forecast = point_fc[0]

    # Step 2: Compute historical residuals
    # Use rolling one-step-ahead forecasts on training set for residual targets
    historical_forecasts = compute_rolling_forecasts(model, series, horizon=1)
    residuals = series[-len(historical_forecasts):] - historical_forecasts

    # Step 3: Train LightGBM on covariates → residuals
    train_X = covariate_df.iloc[-len(residuals):]
    gbm = lgb.LGBMRegressor(n_estimators=100, max_depth=4, learning_rate=0.05)
    gbm.fit(train_X.values, residuals)

    # Step 4: Predict residual correction for future
    future_X = covariate_df.iloc[-horizon:]
    residual_correction = gbm.predict(future_X.values)

    return base_forecast + residual_correction
```

