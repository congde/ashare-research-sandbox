## Remember

Foundation models for time series are powerful zero-shot tools, but they do not eliminate the need for:
1. **Proper data preparation** — garbage in, garbage out still applies
2. **Temporal evaluation discipline** — always use chronological splits, never shuffle
3. **Metric selection** — use scale-free metrics (MASE) for cross-series comparison
4. **Production monitoring** — forecast quality degrades over time without intervention
5. **Classical baselines** — always benchmark against ETS/ARIMA/seasonal naive before claiming foundation model wins

The decoder-only patched transformer architecture (as pioneered by TimesFM) represents a paradigm shift: pre-train once on diverse temporal data, then forecast any domain zero-shot. But the craft of forecasting — understanding seasonality, handling missing data, selecting the right evaluation window — remains as important as ever.
