## 2. Data Preparation Pipeline

### 2.1 Loading and Inspection

```python
import pandas as pd
import numpy as np
from typing import Optional


def load_time_series(
    path: str,
    time_col: str,
    value_col: str,
    freq: Optional[str] = None,
) -> pd.Series:
    """Load a univariate time series from CSV with validation."""
    df = pd.read_csv(path, parse_dates=[time_col])
    df = df.sort_values(time_col).reset_index(drop=True)

    # Detect frequency
    inferred_freq = pd.infer_freq(df[time_col])
    if inferred_freq is None and freq is None:
        raise ValueError("Cannot infer frequency — provide freq parameter")

    ts = df.set_index(time_col)[value_col]
    ts.index.freq = freq or inferred_freq

    # Report gaps
    expected_len = len(pd.date_range(ts.index[0], ts.index[-1], freq=ts.index.freq))
    actual_len = len(ts)
    if actual_len < expected_len:
        gap_pct = (expected_len - actual_len) / expected_len * 100
        print(f"Warning: {gap_pct:.1f}% missing timestamps ({expected_len - actual_len} gaps)")

    return ts


def inspect_series(ts: pd.Series) -> dict:
    """Compute diagnostic statistics for a time series."""
    return {
        "length": len(ts),
        "freq": ts.index.freq,
        "start": ts.index[0],
        "end": ts.index[-1],
        "nan_count": ts.isna().sum(),
        "nan_pct": ts.isna().mean() * 100,
        "mean": ts.mean(),
        "std": ts.std(),
        "min": ts.min(),
        "max": ts.max(),
        "zeros_pct": (ts == 0).mean() * 100,
        "is_positive": (ts.dropna() >= 0).all(),
    }
```

### 2.2 Missing Value Handling

| Gap Size | Pattern | Method | Code |
|----------|---------|--------|------|
| 1-2 points | Random | Linear interpolation | `ts.interpolate(method='linear')` |
| 3-10 points | Random | Seasonal interpolation | Custom (see below) |
| >10 points | Systematic | Treat as separate series or flag | Split at gap boundary |
| Leading NaNs | Common | Strip | `ts[ts.first_valid_index():]` |

```python
def interpolate_seasonal(
    ts: pd.Series,
    period: int,
    max_gap: int = 10,
) -> pd.Series:
    """Fill gaps using seasonal decomposition + linear interpolation."""
    filled = ts.copy()
    nan_mask = filled.isna()

    # For small gaps: use values from same seasonal position
    for idx in filled.index[nan_mask]:
        position = filled.index.get_loc(idx)
        candidates = []
        for offset in [-period, period, -2 * period, 2 * period]:
            neighbor = position + offset
            if 0 <= neighbor < len(filled) and not np.isnan(filled.iloc[neighbor]):
                candidates.append(filled.iloc[neighbor])
        if candidates:
            filled.loc[idx] = np.mean(candidates)

    # Remaining gaps: linear interpolation
    filled = filled.interpolate(method='linear', limit=max_gap)
    return filled
```

**TimesFM built-in handling**: TimesFM internally strips leading NaNs and applies linear interpolation. For most use cases, you can pass raw series with NaNs directly — but for best results, handle gaps explicitly before inference.

### 2.3 Normalization and Stationarity

**When to normalize manually vs. relying on the model:**

| Scenario | Manual Normalization | Model Handles It |
|----------|---------------------|-----------------|
| TimesFM with `normalize_inputs=True` | No | Yes (RevIN) |
| Chronos | No | Yes (mean scaling) |
| PatchTST fine-tuning | Yes (Z-score per series) | No |
| Cross-series comparison | Yes (scale-free metrics) | N/A |

```python
from statsmodels.tsa.stattools import adfuller


def check_stationarity(ts: pd.Series, significance: float = 0.05) -> dict:
    """ADF test for stationarity."""
    result = adfuller(ts.dropna(), autolag='AIC')
    return {
        "adf_statistic": result[0],
        "p_value": result[1],
        "is_stationary": result[1] < significance,
        "lags_used": result[2],
        "critical_values": result[4],
    }


def make_stationary(ts: pd.Series, max_diffs: int = 2) -> tuple[pd.Series, int]:
    """Apply differencing until stationary. Returns (differenced_series, num_diffs)."""
    current = ts.copy()
    for d in range(max_diffs):
        if check_stationarity(current)["is_stationary"]:
            return current, d
        current = current.diff().dropna()
    return current, max_diffs
```

### 2.4 Train/Validation/Test Split

**Critical rule**: NEVER shuffle temporal data. Always use chronological splits.

```python
def temporal_split(
    series: np.ndarray,
    val_ratio: float = 0.1,
    test_ratio: float = 0.2,
) -> tuple[np.ndarray, np.ndarray, np.ndarray]:
    """Chronological train/val/test split. No shuffling."""
    n = len(series)
    test_size = int(n * test_ratio)
    val_size = int(n * val_ratio)
    train_size = n - val_size - test_size

    train = series[:train_size]
    val = series[train_size:train_size + val_size]
    test = series[train_size + val_size:]
    return train, val, test
```

```
|<------- train ------->|<-- val -->|<--- test --->|
t0                       t1          t2             tN
                         ^           ^
                    val_start    test_start

NEVER: random split → lookahead bias → inflated metrics
```

### 2.5 Frequency Alignment and Resampling

```python
def align_to_frequency(
    ts: pd.Series,
    target_freq: str,
    agg_func: str = "mean",
) -> pd.Series:
    """Resample time series to target frequency."""
    resampled = ts.resample(target_freq)
    if agg_func == "mean":
        return resampled.mean()
    elif agg_func == "sum":
        return resampled.sum()
    elif agg_func == "last":
        return resampled.last()
    raise ValueError(f"Unknown agg_func: {agg_func}")


# Common frequency codes:
# 'T' / 'min' = minutely, 'H' / 'h' = hourly, 'D' = daily,
# 'W' = weekly, 'MS' = month start, 'QS' = quarter start
```

