# Sequential Prediction with Foundation Models

Patterns and best practices for time series forecasting using pre-trained foundation models, covering the full pipeline from raw data to production inference. Grounded in the TimesFM architecture (Google Research, ICML 2024) and the broader foundation model ecosystem.

## When to Activate

- Building or evaluating a time series forecasting pipeline
- Selecting a foundation model for sequential prediction tasks
- Preprocessing temporal data (missing values, normalization, frequency alignment)
- Designing evaluation methodology for forecasting experiments
- Comparing foundation model approaches against statistical or supervised baselines
- Deploying a forecasting model to production (batch or real-time)
- Debugging poor forecast quality, data leakage, or distribution shift issues
- Generating synthetic time series data for training or augmentation
- Implementing probabilistic (quantile/distributional) forecasting

---

## 1. Core Concepts

### 1.1 Foundation Model Landscape

| Model | Architecture | Params | Output Type | Max Context | Strengths | Best For |
|-------|-------------|--------|-------------|-------------|-----------|----------|
| **TimesFM 2.5** | Decoder-only transformer | 200M | Quantiles + mean | 16,384 | Longest context, covariate support (XReg), flip invariance | General-purpose, long-horizon, zero-shot |
| **Chronos** | T5 encoder-decoder | 8M-710M | Discrete token bins | 512 | Strong zero-shot, multiple sizes, good on diverse frequencies | Quick baseline, no fine-tuning budget |
| **Moirai** | Any-variate transformer | 14M-311M | Mixture distribution | 5,000 | Multi-variate native, any-frequency, flexible distribution | Multi-channel sensor data, mixed frequencies |
| **Lag-Llama** | LLaMA-based decoder | 6.5M | Student's t distribution | 1,024 | Lag-feature injection, open weights, lightweight | Probabilistic forecasting with heavy tails |
| **PatchTST** | Patch-based encoder | ~10M | Point forecast | 512 | Channel-independent, strong supervised performance | Domain-specific fine-tuning |
| **iTransformer** | Inverted attention | ~10M | Point forecast | 720 | Attention over variate dimension, captures cross-variable relations | High-dimensional multivariate |
| **Timer** | GPT-style decoder | 67M-1B | Next-token | 2,048 | Unified generation paradigm, flexible horizon | Research, flexible generation |

### 1.2 Key Architectural Ideas

#### Patch-Based Tokenization

Foundation models for time series break raw sequences into **non-overlapping patches** (analogous to tokens in LLMs). This reduces the sequence length fed to the transformer by a factor of `patch_len`, dramatically improving efficiency.

```
Raw series:     [x1, x2, x3, ..., x32, x33, ..., x64, ...]
                |--- patch 1 (p=32) ---| |--- patch 2 ---|
Tokens:         [    embedding_1,           embedding_2,  ...]
```

**TimesFM innovation — asymmetric patches**: `input_patch_len=32`, `output_patch_len=128`. Each input token predicts 128 future values (4x expansion), reducing autoregressive decode steps:

```python
# Autoregressive steps needed for horizon H with output_patch_len h:
num_decode_steps = math.ceil(H / h)
# H=512, h=128 → only 4 decode steps (vs 16 with h=32)
```

#### Reversible Instance Normalization (RevIN)

Per-instance normalization that preserves scale at output. Critical for handling series with vastly different value ranges without explicit feature engineering:

```python
def revin(x: torch.Tensor, mu: torch.Tensor, sigma: torch.Tensor, reverse: bool = False) -> torch.Tensor:
    """Reversible per-instance normalization."""
    TOLERANCE = 1e-8
    if reverse:
        return x * sigma + mu                                        # denormalize
    return (x - mu) / torch.where(sigma < TOLERANCE, 1.0, sigma)    # normalize
```

Statistics are computed incrementally per patch using Welford's online algorithm, allowing running mean/std to adapt as new patches are processed.

#### Decoder-Only vs Encoder-Decoder

| Aspect | Decoder-Only (TimesFM, Lag-Llama, Timer) | Encoder-Decoder (Chronos) |
|--------|------------------------------------------|---------------------------|
| Training | Parallel over entire context via causal mask | Encoder: bidirectional, Decoder: causal |
| Inference | Autoregressive with KV-cache | Encode once, decode autoregressively |
| Context flexibility | Natural for variable-length inputs | Fixed encoder window, then decode |
| Complexity | Single stack | Two stacks, cross-attention |

#### Positional Encoding for Time

- **RoPE (Rotary Positional Embeddings)**: Used by TimesFM 2.5. Encodes relative positions via rotation matrices — naturally handles variable-length sequences and extrapolates to unseen positions.
- **Sinusoidal**: Original Transformer PEs. Used in TimesFM v1.
- **Frequency tokens**: Some models (TimesFM v1/v2) use explicit frequency indicators (0=high, 1=medium, 2=low) to condition generation on data granularity.

