## 3. Model Usage Patterns

### 3.1 TimesFM: End-to-End

```python
import torch
import numpy as np
import timesfm

torch.set_float32_matmul_precision("high")

# 1. Load pretrained model from Hugging Face
model = timesfm.TimesFM_2p5_200M_torch.from_pretrained(
    "google/timesfm-2.5-200m-pytorch"
)

# 2. Configure forecast settings
config = timesfm.ForecastConfig(
    max_context=1024,                     # max input length (padded/truncated)
    max_horizon=256,                      # max forecast horizon
    normalize_inputs=True,                # enable RevIN
    use_continuous_quantile_head=True,     # smoother quantile curves (30M head)
    force_flip_invariance=True,           # average forecast of x and -x
    infer_is_positive=True,               # clamp to >= 0 when all inputs are positive
    fix_quantile_crossing=True,           # sort quantiles to prevent crossing
)
model.compile(config)

# 3. Forecast — accepts list of variable-length numpy arrays
point_forecast, quantile_forecast = model.forecast(
    horizon=96,
    inputs=[
        np.sin(np.linspace(0, 20, 500)),   # series 1
        np.random.randn(200).cumsum(),      # series 2
    ],
)

# point_forecast.shape:    (2, 96)         — mean prediction
# quantile_forecast.shape: (2, 96, 10)     — [mean, q0.1, q0.2, ..., q0.9]
# quantile_forecast[:, :, 5] is the median (0.5 quantile)
```

**TimesFM with Covariates (XReg):**

```python
# Two modes:
# "xreg + timesfm": fit linear model on targets → forecast residuals with TimesFM
# "timesfm + xreg": forecast with TimesFM → fit linear model on residuals

point_fc, quantile_fc = model.forecast_with_covariates(
    inputs=[sales_history],
    dynamic_numerical_covariates={
        "price": [price_history_and_future],
        "temperature": [temp_history_and_future],
    },
    dynamic_categorical_covariates={
        "day_of_week": [dow_history_and_future],
    },
    static_numerical_covariates={
        "store_area": [150.0],
    },
    xreg_mode="xreg + timesfm",
    normalize_xreg_target_per_input=True,
)
```

### 3.2 Chronos: End-to-End

```python
import torch
import numpy as np
from chronos import ChronosPipeline

pipeline = ChronosPipeline.from_pretrained(
    "amazon/chronos-t5-large",       # options: tiny, mini, small, base, large
    device_map="auto",
    torch_dtype=torch.bfloat16,
)

context = torch.tensor(np.sin(np.linspace(0, 20, 500)))

# Generate probabilistic forecast (samples from predictive distribution)
forecast = pipeline.predict(
    context=context,
    prediction_length=64,
    num_samples=20,           # number of Monte Carlo samples
)
# forecast.shape: (1, 20, 64)

# Point forecast: median of samples
point = np.median(forecast[0].numpy(), axis=0)
# Prediction interval
lower = np.quantile(forecast[0].numpy(), 0.1, axis=0)
upper = np.quantile(forecast[0].numpy(), 0.9, axis=0)
```

