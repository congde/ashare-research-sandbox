## 5. Common Pitfalls and Anti-Patterns

### 5.1 Lookahead Bias (Data Leakage)

```python
# BAD: Normalizing with full dataset statistics before splitting
from sklearn.preprocessing import StandardScaler
scaler = StandardScaler()
all_data_normalized = scaler.fit_transform(full_dataset)  # leaks test info!
train, test = all_data_normalized[:split], all_data_normalized[split:]

# GOOD: Normalize with training set statistics only
scaler = StandardScaler()
train_normalized = scaler.fit_transform(train_set)
test_normalized = scaler.transform(test_set)              # transform only, no fit
```

### 5.2 Wrong Temporal Split

```python
# BAD: Random shuffle destroys temporal ordering
from sklearn.model_selection import train_test_split
train, test = train_test_split(data, test_size=0.2, random_state=42)

# GOOD: Chronological split preserving order
split_idx = int(len(data) * 0.8)
train, test = data[:split_idx], data[split_idx:]
```

### 5.3 Scale-Dependent Metric Comparison

```python
# BAD: Comparing raw MSE across datasets with different scales
# Dataset A (temperature, range 0-40): MSE = 2.5
# Dataset B (stock price, range 100-5000): MSE = 1500
# Conclusion: "Model is worse on B" — WRONG, just different scale

# GOOD: Use scale-free metrics for cross-dataset comparison
for name, (actual, predicted, history) in datasets.items():
    mase = compute_point_metrics(actual, predicted, history=history)["mase"]
    print(f"{name}: MASE = {mase:.3f}")
```

### 5.4 Ignoring Distribution Shift

```python
# BAD: Train once, deploy forever
model.fit(historical_data)
# ... months pass, no retraining ...

# GOOD: Monitor and re-evaluate on recent windows
def should_retrain(recent_errors: list[float], baseline_mase: float, threshold: float = 0.3) -> bool:
    """Alert when recent forecast quality degrades significantly."""
    recent_mase = np.mean(recent_errors)
    degradation = (recent_mase - baseline_mase) / baseline_mase
    return degradation > threshold
```

### 5.5 Misusing Probabilistic Outputs

```python
# BAD: Using only the median, ignoring uncertainty
prediction = quantile_forecasts[:, 4]  # 0.5 quantile only
decision = "order 100 units" if prediction > threshold else "order 50 units"

# GOOD: Use the full quantile range for decision-making under uncertainty
median = quantile_forecasts[:, 4]      # 0.5 quantile
lower = quantile_forecasts[:, 0]       # 0.1 quantile — worst case
upper = quantile_forecasts[:, 8]       # 0.9 quantile — best case

# Risk-aware decision: use higher quantile for safety stock
safety_stock = np.maximum(upper - median, 0)
order_quantity = median + safety_stock * risk_factor
```

### 5.6 Context Length Mismatches

```python
# BAD: Using very short context for hourly data with weekly seasonality
config = timesfm.ForecastConfig(max_context=48)   # only 2 days — misses weekly pattern

# BAD: Using excessively long context that includes regime changes
config = timesfm.ForecastConfig(max_context=16384) # 2 years of hourly — old regime hurts

# GOOD: Match context to the longest seasonality you want to capture
# Hourly with weekly seasonality: 168 * 2 = 336 minimum (2 full weeks)
# Daily with annual seasonality: 365 * 2 = 730 minimum (2 full years)
config = timesfm.ForecastConfig(max_context=512)   # 3 weeks — captures weekly pattern
```

### 5.7 Frequency Mismatch in Evaluation

```python
# BAD: Evaluating a monthly model on daily targets (or vice versa)
# This gives misleading accuracy numbers

# GOOD: Ensure forecast and actual have the same frequency and alignment
assert len(actual) == len(predicted), "Forecast/actual length mismatch"
assert actual.index.freq == predicted.index.freq, "Frequency mismatch"
```

