## 9. Synthetic Data Augmentation

TimesFM training uses 20% synthetic data to improve generalization on underrepresented frequencies. This pattern is useful for fine-tuning:

```python
import numpy as np
from typing import Optional


def generate_arma_series(
    n: int,
    ar_coeffs: Optional[list[float]] = None,
    ma_coeffs: Optional[list[float]] = None,
    noise_std: float = 1.0,
) -> np.ndarray:
    """Generate an ARMA(p,q) process."""
    ar_coeffs = ar_coeffs or [0.7, -0.2]
    ma_coeffs = ma_coeffs or [0.3]
    p, q = len(ar_coeffs), len(ma_coeffs)
    series = np.zeros(n)
    noise = np.random.randn(n) * noise_std

    for t in range(max(p, q), n):
        ar_term = sum(ar_coeffs[i] * series[t - i - 1] for i in range(p))
        ma_term = sum(ma_coeffs[i] * noise[t - i - 1] for i in range(q))
        series[t] = ar_term + ma_term + noise[t]

    return series


def generate_seasonal_series(
    n: int,
    periods: list[int],
    amplitudes: Optional[list[float]] = None,
    noise_std: float = 0.1,
) -> np.ndarray:
    """Generate multi-seasonal series (sum of sines + noise)."""
    amplitudes = amplitudes or [1.0] * len(periods)
    t = np.arange(n, dtype=float)
    series = sum(
        amp * np.sin(2 * np.pi * t / period + np.random.uniform(0, 2 * np.pi))
        for period, amp in zip(periods, amplitudes)
    )
    series += np.random.randn(n) * noise_std
    return series


def generate_trend_series(
    n: int,
    trend_type: str = "linear",
    num_changepoints: int = 2,
) -> np.ndarray:
    """Generate trend with changepoints."""
    t = np.arange(n, dtype=float) / n
    series = np.zeros(n)
    changepoints = sorted(np.random.uniform(0.1, 0.9, num_changepoints))
    changepoints = [0.0] + changepoints + [1.0]

    for i in range(len(changepoints) - 1):
        start_idx = int(changepoints[i] * n)
        end_idx = int(changepoints[i + 1] * n)
        segment_len = end_idx - start_idx
        slope = np.random.uniform(-2, 2)
        intercept = series[start_idx - 1] if start_idx > 0 else np.random.uniform(-1, 1)

        if trend_type == "linear":
            series[start_idx:end_idx] = intercept + slope * np.arange(segment_len) / segment_len
        elif trend_type == "exponential":
            series[start_idx:end_idx] = intercept * np.exp(slope * np.arange(segment_len) / segment_len)

    return series


def augment_training_data(
    real_series: list[np.ndarray],
    synthetic_ratio: float = 0.2,
    series_length: int = 2048,
) -> list[np.ndarray]:
    """Augment real data with synthetic series (TimesFM-style 80/20 mix)."""
    num_synthetic = int(len(real_series) * synthetic_ratio / (1 - synthetic_ratio))
    synthetic = []

    generators = [
        lambda: generate_arma_series(series_length),
        lambda: generate_seasonal_series(series_length, periods=[24, 168]),
        lambda: generate_seasonal_series(series_length, periods=[12, 52]),
        lambda: generate_trend_series(series_length, trend_type="linear"),
        lambda: (
            generate_arma_series(series_length, noise_std=0.3)
            + generate_seasonal_series(series_length, periods=[24])
            + generate_trend_series(series_length)
        ),
    ]

    for _ in range(num_synthetic):
        gen = np.random.choice(generators)
        synthetic.append(gen())

    return real_series + synthetic
```

