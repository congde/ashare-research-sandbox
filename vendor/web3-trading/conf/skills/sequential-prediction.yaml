### 10.2 Key Hyperparameters

| Parameter | TimesFM 2.5 | Chronos (Large) | Moirai (Large) | Notes |
|-----------|-------------|-----------------|----------------|-------|
| Parameters | 200M | 710M | 311M | Smaller != worse |
| Context | 16,384 | 512 | 5,000 | Longer captures more history |
| Horizon | Unlimited (AR) | 64 per call | Configurable | Chain calls for longer |
| Quantiles | 9 + mean | ~20 bins (sample) | Mixture dist | More = finer uncertainty |
| Patch size | 32 (input) / 128 (output) | 1 (token-level) | Auto | Larger = faster, coarser |
| Positional encoding | RoPE | Sinusoidal (T5) | RoPE | RoPE extrapolates better |

### 10.3 TimesFM Architecture Summary

```
Input series: [x1, x2, ..., xN]
    ↓
Strip leading NaNs + linear interpolation
    ↓
Pad/truncate to max_context
    ↓
Patch into chunks of 32: [(x1..x32), (x33..x64), ...]
    ↓
Per-patch RevIN normalization (Welford online stats)
    ↓
ResidualBlock tokenizer: patch → 1280-dim embedding
    ↓
20× Transformer layers:
  ├── RMSNorm → Multi-Head Attention (16 heads, RoPE, causal mask)
  ├── RMSNorm → Post-attention residual
  ├── RMSNorm → FFN (SwiGLU, 1280-dim)
  └── RMSNorm → Post-FFN residual
    ↓
Output head: 1280-dim → 128 values × 10 quantiles
    ↓
RevIN denormalization
    ↓
Post-processing: flip invariance, non-negativity, quantile sort
    ↓
Output: point_forecast (B, H), quantile_forecast (B, H, 10)
```

### 10.4 Evaluation Metrics Cheat Sheet

| Metric | Formula | Scale-Free | Probabilistic | When to Use |
|--------|---------|-----------|---------------|-------------|
| MAE | `mean(\|y - y_hat\|)` | No | No | Single-series tracking |
| MASE | `MAE / naive_MAE` | Yes | No | Cross-dataset benchmark |
| sMAPE | `mean(2\|y-y_hat\| / (\|y\|+\|y_hat\|))` | Yes | No | Business reporting |
| CRPS | `integral (CDF - 1)^2` | No | Yes | Probabilistic quality |
| WQL | `sum(q * max(y-q_hat, 0) + (1-q) * max(q_hat-y, 0))` | No | Yes | Quantile accuracy |
| Calibration | `P(y <= q_hat) vs q` | N/A | Yes | Reliability check |

