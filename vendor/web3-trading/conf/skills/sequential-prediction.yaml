### 6.4 Monitoring and Drift Detection

```python
from collections import deque


class ForecastMonitor:
    """Lightweight production monitor for forecast quality."""

    def __init__(self, baseline_mase: float, window_size: int = 100, alert_threshold: float = 0.3):
        self.baseline_mase = baseline_mase
        self.window_size = window_size
        self.alert_threshold = alert_threshold
        self.recent_errors = deque(maxlen=window_size)

    def record(self, actual: float, predicted: float, naive_error: float) -> dict:
        """Record a single observation and check for drift."""
        abs_error = abs(actual - predicted)
        scaled_error = abs_error / naive_error if naive_error > 0 else abs_error
        self.recent_errors.append(scaled_error)

        current_mase = np.mean(self.recent_errors) if len(self.recent_errors) >= 10 else None
        degradation = (
            (current_mase - self.baseline_mase) / self.baseline_mase
            if current_mase is not None
            else None
        )

        return {
            "current_mase": current_mase,
            "degradation_pct": degradation * 100 if degradation else None,
            "alert": degradation is not None and degradation > self.alert_threshold,
            "window_fill": len(self.recent_errors) / self.window_size,
        }
```

