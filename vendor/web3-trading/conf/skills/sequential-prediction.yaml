## 8. Decision Frameworks

### 8.1 Model Selection Flowchart

```
Need probabilistic forecasts?
├── YES
│   ├── Multi-variate data? → YES → Moirai (native multi-variate)
│   └── NO
│       ├── Heavy tails expected? → YES → Lag-Llama (Student's t)
│       └── NO → TimesFM (quantile head) or Chronos (sample-based)
└── NO (point forecast)
    ├── Have domain-specific training data?
    │   ├── YES → PatchTST or iTransformer (fine-tune)
    │   └── NO → TimesFM (best zero-shot point forecast)
    └── Need cross-variable modeling?
        ├── YES → iTransformer or Moirai
        └── NO → TimesFM or Chronos
```

### 8.2 Context Length Selection Guide

| Data Frequency | Dominant Seasonality | Recommended Context | Rationale |
|----------------|---------------------|---------------------|-----------|
| Minutely | Daily (1440) | 2,880-4,320 (2-3 days) | Capture 2+ daily cycles |
| Hourly | Weekly (168) | 336-720 (2-4 weeks) | Capture 2+ weekly cycles |
| Daily | Annual (365) | 365-730 (1-2 years) | Capture annual pattern |
| Weekly | Annual (52) | 104-156 (2-3 years) | Capture annual + trend |
| Monthly | Annual (12) | 36-120 (3-10 years) | Multi-year cycles |
| Quarterly | Multi-year | 20-40 (5-10 years) | Long-term trends |

**Rule of thumb**: context >= 2x longest seasonal period you want to capture.

### 8.3 Foundation Model vs. Classical Methods

| Scenario | Recommendation | Why |
|----------|---------------|-----|
| Single well-understood series, years of history | Classical (ETS, ARIMA, Prophet) | Interpretable, proven, no GPU needed |
| Hundreds of heterogeneous series, limited per-series history | Foundation model (zero-shot) | Transfer learning fills data gaps |
| Cold-start / new product with zero history | Foundation model | No history needed, pattern transfer |
| Requirement for full explainability | Classical or hybrid | Foundation models are black boxes |
| Highest accuracy needed, GPU available | Foundation model (fine-tuned) | Best of both worlds |
| Extremely high-frequency (tick-level) data | Specialized (not foundation) | Foundation models not trained on this regime |
| Need to forecast 100K+ series daily | Foundation model (batch inference) | Amortized cost per series is lower |

