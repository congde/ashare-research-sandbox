## 4. Evaluation Methodology

### 4.1 Point Forecast Metrics

```python
import numpy as np
from typing import Optional


def compute_point_metrics(
    actual: np.ndarray,
    predicted: np.ndarray,
    seasonal_period: int = 1,
    history: Optional[np.ndarray] = None,
) -> dict[str, float]:
    """Compute standard point forecast metrics."""
    errors = actual - predicted
    abs_errors = np.abs(errors)
    n = len(actual)

    metrics = {
        "mae": np.mean(abs_errors),
        "mse": np.mean(errors ** 2),
        "rmse": np.sqrt(np.mean(errors ** 2)),
    }

    # MAPE — avoid division by zero
    nonzero = actual != 0
    if nonzero.any():
        metrics["mape"] = np.mean(np.abs(errors[nonzero] / actual[nonzero])) * 100

    # sMAPE — symmetric, handles near-zero values
    denom = np.abs(actual) + np.abs(predicted)
    nonzero_denom = denom > 0
    if nonzero_denom.any():
        metrics["smape"] = np.mean(
            2 * abs_errors[nonzero_denom] / denom[nonzero_denom]
        ) * 100

    # MASE — scale-free, requires history for naive seasonal forecast
    if history is not None and len(history) > seasonal_period:
        naive_errors = np.abs(history[seasonal_period:] - history[:-seasonal_period])
        naive_mae = np.mean(naive_errors)
        if naive_mae > 0:
            metrics["mase"] = metrics["mae"] / naive_mae

    return metrics
```

**Metric Selection Guide:**

| Metric | Scale-Free | Handles Zeros | Symmetric | Best For |
|--------|-----------|---------------|-----------|----------|
| MAE | No | Yes | Yes | Single-series interpretability |
| RMSE | No | Yes | Yes | Penalizing large errors |
| MAPE | Yes | **No** | No | Business reporting (avoid near-zero) |
| sMAPE | Yes | Yes* | Yes | Cross-series comparison |
| MASE | Yes | Yes | Yes | Academic benchmarking, seasonal data |

**Recommended default**: MASE for cross-dataset comparison; MAE for single-series tracking.

### 4.2 Probabilistic Forecast Metrics

```python
def weighted_quantile_loss(
    actual: np.ndarray,
    quantile_forecasts: np.ndarray,
    quantile_levels: np.ndarray,
) -> dict[str, float]:
    """Compute weighted quantile loss (WQL) per quantile level."""
    losses = {}
    for i, q in enumerate(quantile_levels):
        errors = actual - quantile_forecasts[:, i]
        losses[f"wql_{q:.1f}"] = np.mean(
            np.where(errors >= 0, q * errors, (q - 1) * errors)
        ) * 2  # multiply by 2 for standard WQL

    losses["wql_mean"] = np.mean(list(losses.values()))
    return losses


def crps_quantile(
    actual: np.ndarray,
    quantile_forecasts: np.ndarray,
    quantile_levels: np.ndarray,
) -> float:
    """Approximate CRPS from quantile forecasts via numerical integration."""
    n_quantiles = len(quantile_levels)
    crps = 0.0
    for i in range(n_quantiles - 1):
        dq = quantile_levels[i + 1] - quantile_levels[i]
        midpoint = (quantile_forecasts[:, i] + quantile_forecasts[:, i + 1]) / 2
        indicator = (actual <= midpoint).astype(float)
        q_mid = (quantile_levels[i] + quantile_levels[i + 1]) / 2
        crps += np.mean((indicator - q_mid) ** 2) * dq
    return crps


def calibration_curve(
    actual: np.ndarray,
    quantile_forecasts: np.ndarray,
    quantile_levels: np.ndarray,
) -> dict[str, float]:
    """Check if q-quantile actually covers q% of observations."""
    coverage = {}
    for i, q in enumerate(quantile_levels):
        coverage[f"q{q:.1f}_coverage"] = np.mean(actual <= quantile_forecasts[:, i])
    return coverage
```

### 4.3 Cross-Dataset Aggregation

Use **geometric mean** (not arithmetic mean) to aggregate metrics across datasets. This prevents large-error datasets from dominating:

```python
from scipy.stats import gmean


def aggregate_across_datasets(
    per_dataset_metrics: dict[str, float],
) -> float:
    """Geometric mean aggregation — standard for Monash/M-competition benchmarks."""
    values = np.array(list(per_dataset_metrics.values()))
    return gmean(values[values > 0])
```

### 4.4 Rolling Window Backtesting

```python
def rolling_backtest(
    series: np.ndarray,
    forecast_fn,
    horizon: int,
    min_context: int,
    stride: int = 1,
) -> list[dict]:
    """Proper backtesting with rolling origin — no lookahead bias."""
    results = []
    n = len(series)

    for origin in range(min_context, n - horizon, stride):
        context = series[:origin]
        actual = series[origin:origin + horizon]

        predicted = forecast_fn(context, horizon)

        metrics = compute_point_metrics(
            actual=actual,
            predicted=predicted,
            history=context,
        )
        metrics["origin"] = origin
        results.append(metrics)

    return results
```

### 4.5 Statistical Significance: Diebold-Mariano Test

```python
from scipy import stats


def diebold_mariano_test(
    errors_1: np.ndarray,
    errors_2: np.ndarray,
    horizon: int = 1,
) -> dict[str, float]:
    """Test whether two forecasters have significantly different accuracy.

    H0: E[d_t] = 0 (equal predictive accuracy)
    """
    d = errors_1 ** 2 - errors_2 ** 2
    n = len(d)
    mean_d = np.mean(d)
    var_d = np.var(d, ddof=1)

    # Newey-West adjustment for serial correlation
    for k in range(1, horizon):
        gamma_k = np.cov(d[k:], d[:-k])[0, 1]
        var_d += 2 * (1 - k / horizon) * gamma_k / n

    dm_stat = mean_d / np.sqrt(var_d / n)
    p_value = 2 * stats.t.sf(np.abs(dm_stat), df=n - 1)

    return {
        "dm_statistic": dm_stat,
        "p_value": p_value,
        "significant_at_0.05": p_value < 0.05,
        "better_model": 1 if mean_d > 0 else 2,
    }
```

### 4.6 Forecast Visualization

```python
import matplotlib.pyplot as plt
import matplotlib.dates as mdates
import numpy as np
from typing import Optional


def plot_forecast(
    history: np.ndarray,
    forecast: np.ndarray,
    quantile_forecast: Optional[np.ndarray] = None,
    actual: Optional[np.ndarray] = None,
    title: str = "Time Series Forecast",
    dates: Optional[np.ndarray] = None,
    figsize: tuple = (14, 5),
) -> plt.Figure:
    """Plot forecast with prediction intervals and optional actuals."""
    fig, ax = plt.subplots(figsize=figsize)

    n_hist = len(history)
    n_fc = len(forecast)
    x_hist = np.arange(n_hist) if dates is None else dates[:n_hist]
    x_fc = np.arange(n_hist, n_hist + n_fc) if dates is None else dates[n_hist:n_hist + n_fc]

    # History
    ax.plot(x_hist, history, color="#2196F3", linewidth=1.5, label="History")

    # Forecast
    ax.plot(x_fc, forecast, color="#FF5722", linewidth=2, label="Forecast")

    # Prediction intervals (from quantile forecasts)
    if quantile_forecast is not None:
        # 80% interval (q0.1 - q0.9)
        ax.fill_between(x_fc, quantile_forecast[:, 0], quantile_forecast[:, 8],
                        alpha=0.15, color="#FF5722", label="80% PI")
        # 50% interval (q0.2 - q0.8)
        ax.fill_between(x_fc, quantile_forecast[:, 1], quantile_forecast[:, 7],
                        alpha=0.25, color="#FF5722", label="50% PI")

    # Actual (if available, for backtesting)
    if actual is not None:
        ax.plot(x_fc[:len(actual)], actual, color="#4CAF50", linewidth=1.5,
                linestyle="--", label="Actual")

    ax.axvline(x=x_fc[0], color="gray", linestyle=":", alpha=0.5)
    ax.set_title(title)
    ax.legend(loc="upper left")
    ax.grid(True, alpha=0.3)
    plt.tight_layout()
    return fig


def plot_backtest_results(
    backtest_results: list[dict],
    metric: str = "mae",
    figsize: tuple = (12, 4),
) -> plt.Figure:
    """Plot metric over rolling backtest origins to detect drift."""
    fig, ax = plt.subplots(figsize=figsize)
    origins = [r["origin"] for r in backtest_results]
    values = [r[metric] for r in backtest_results]

    ax.plot(origins, values, color="#2196F3", alpha=0.5, linewidth=0.8)
    # Rolling average
    window = max(1, len(values) // 10)
    rolling = np.convolve(values, np.ones(window) / window, mode="valid")
    ax.plot(origins[window - 1:], rolling, color="#FF5722", linewidth=2, label=f"Rolling {metric.upper()}")

    ax.set_xlabel("Forecast Origin")
    ax.set_ylabel(metric.upper())
    ax.set_title(f"Backtest {metric.upper()} Over Time")
    ax.legend()
    ax.grid(True, alpha=0.3)
    plt.tight_layout()
    return fig
```

