# DexScan skill — DEX on-chain data: https://web3-dexscan.gitbook.io/api
name: dexScan
dag_eligible: true

summary: >-
  DEX on-chain data via DexScan API. Provides token prices, K-line candlesticks,
  stats (change%/volume/high/low), liquidity, market cap, risk labels, coin rankings,
  top holders, top liquidity pools, trade records, liquidity changes, Alpha tokens,
  and social heat. Covers SOL/BSC/ETH/Base/Arbitrum/Avalanche/Polygon/Optimism/Monad chains.

description: >-
  Query DEX on-chain market data via the DexScan API.
  All operations are accessed through the unified sub-tool ``dexScan_api``
  with an ``operation`` parameter. For DEX token analysis on Solana meme coins,
  BSC, or other non-CEX tokens, prefer this skill over valueScan_api.

  HARD CONSTRAINT (MANDATORY):
  If this skill is selected, you MUST create at least ONE task for
  dexScan_api. Choose the appropriate operation based on user intent.

  ## Operation Quick Reference

  | Operation | API Endpoint | Description | Required Params |
  |-----------|-------------|-------------|-----------------|
  | current_price | /v3/dex/market/current-price | Latest token price | chain + address (or symbol) |
  | kline_history | /v3/dex/market/kline-history | Historical K-line data | chain + address (or symbol) |
  | token_stats | /v3/dex/market/stats | Stats: change%, volume, high, low | chain + address (or symbol) |
  | coin_infos | /v3/dex/market/coin-infos | Token info: price, supply, holders | chain + address (or symbol) |
  | price_info | /v3/dex/market/price-info | Price + multi-timeframe change/volume | chain + address (or symbol) |
  | coin_market_cap | /v3/dex/market/coin-market-cap | Token market cap | chain + address (or symbol) |
  | coin_liquidity | /v3/dex/market/coin-liquid | Token liquidity | chain + address (or symbol) |
  | coin_risk_labels | /v3/dex/market/coin-risk-labels | Risk level labels | chain + address (or symbol) |
  | coin_rank | /v3/dex/market/coin-rank | Token ranking list | extras.chain, extras.timeframe |
  | top_holders | /v3/dex/market/coin-balance-top | Top 100 holders | chain + address (or symbol) |
  | top_pools | /v3/dex/market/liquid-pool-top | Top 5 liquidity pools | chain + address (or symbol) |
  | trade_scroll | /v3/dex/market/trade-scroll | DEX trade records | chain + address (or symbol) |
  | liquidity_changes | /v3/dex/market/liquid-change-scroll | Liquidity add/remove records | chain + address (or symbol) |
  | alpha_coin_infos | /v3/dex/alpha/coin-infos | Alpha token info | chain + address (or symbol) |
  | social_heat | /api/heat/heatList | Social heat & KOL analysis | chain + address (or symbol) |
  | dex_overview | (composite) | Full DEX overview for a symbol | symbol |

  ## Tool Parameter Mapping (IMPORTANT)

  - **current_price**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: latest DEX price
    * Use for: "DEX价格", meme coin price

  - **kline_history**:
    * REQUIRED: symbol OR (chain + address)
    * Optional: extras.interval (1s/1m/5m/15m/30m/1h/4h/1d/1w, default 1h), extras.limit (max bars, default 200)
    * Returns: K-line candlestick array (time-descending)
    * Use for: "K线", "走势图", DEX charting

  - **token_stats**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: change%, volume, high, low across timeframes
    * Use for: "涨跌幅", "成交量"

  - **coin_infos**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: price, supply, holders count, token metadata
    * Use for: token fundamentals on DEX

  - **price_info**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: market cap + multi-timeframe change% and volume
    * Use for: comprehensive price snapshot

  - **coin_market_cap**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: token market cap

  - **coin_liquidity**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: total liquidity value
    * Use for: "流动性", liquidity check

  - **coin_risk_labels**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: risk level tags (rug pull indicators, honeypot, etc.)
    * Use for: "风险检测", "是否安全", rug check

  - **coin_rank**:
    * Optional: chain (default solana), extras.timeframe (24h/1h/5m), extras.sort_by (volume/price/change), extras.sort_order (asc/desc), extras.page, extras.page_size
    * Returns: ranked token list
    * Use for: "热门代币", "排行榜", trending tokens

  - **top_holders**:
    * REQUIRED: symbol OR (chain + address)
    * Optional: extras.page, extras.page_size
    * Returns: Top 100 holder addresses with balances
    * Use for: "大户持仓", "巨鲸地址", holder distribution

  - **top_pools**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: Top 5 liquidity pools
    * Use for: "流动池", pool analysis

  - **trade_scroll**:
    * REQUIRED: symbol OR (chain + address)
    * Optional: extras.page, extras.page_size
    * Returns: recent DEX trade list
    * Use for: "交易记录", recent trades

  - **liquidity_changes**:
    * REQUIRED: symbol OR (chain + address)
    * Optional: extras.action_type (add/remove), extras.page, extras.page_size
    * Returns: liquidity add/remove events
    * Use for: "撤池", "加池", liquidity monitoring

  - **alpha_coin_infos**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: Alpha token detailed info
    * Use for: early-stage token analysis

  - **social_heat**:
    * REQUIRED: symbol OR (chain + address)
    * Returns: heat score, KOL top5, 24h price trend, tweet AI summary
    * Use for: "社交热度", "KOL喊单", social momentum

  - **dex_overview**:
    * REQUIRED: symbol
    * Returns: composite overview (price + info + liquidity + risk + pools + holders + heat + trades)
    * Use for: comprehensive DEX token report

  ## Supported Chains

  solana, ethereum, bsc, base, arbitrum, avalanche, polygon, optimism, monad

  ## Common User Intent → Operation Mapping

  - "BONK 价格" / "WIF 多少钱" → current_price or price_info
  - "Solana 热门代币" / "trending" → coin_rank (chain=solana)
  - "代币安全吗" / "rug check" → coin_risk_labels
  - "流动性" / "池子" → coin_liquidity + top_pools
  - "K线" / "走势" → kline_history
  - "大户" / "持仓分布" → top_holders
  - "最近交易" → trade_scroll
  - "撤池监控" → liquidity_changes (action_type=remove)
  - "社交热度" / "KOL" → social_heat
  - "全面分析" → dex_overview

sub_tools:
  - dexScan_api

parameters:
  - name: query
    type: string
    required: true
    description: "Short restatement of user intent (for traceability)"
  - name: operation
    type: string
    required: true
    description: >-
      Which DexScan dataset to fetch. Valid values:
      current_price, kline_history, token_stats, coin_infos, price_info,
      coin_market_cap, coin_liquidity, coin_risk_labels, coin_rank,
      top_holders, top_pools, trade_scroll, liquidity_changes,
      alpha_coin_infos, social_heat, dex_overview
  - name: symbol
    type: string
    required: false
    description: "Token symbol (e.g. BONK, WIF, SOL). Auto-resolves to chain + address."
  - name: chain
    type: string
    required: false
    description: "Chain name: solana, ethereum, bsc, base, arbitrum, avalanche, polygon, optimism, monad."
  - name: address
    type: string
    required: false
    description: "Token contract address on the specified chain."
  - name: extras
    type: object
    required: false
    description: >-
      Optional parameters. Keys: interval (K-line period),
      limit (int, max bars), timeframe (for rankings: 24h/1h/5m),
      sort_by (volume/price/change), sort_order (asc/desc),
      page (int), page_size (int), action_type (add/remove for liquidity changes)
