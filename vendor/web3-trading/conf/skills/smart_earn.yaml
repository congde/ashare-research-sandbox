# 理财产品推荐技能 (Smart Earn Skill)
#
# 功能: 根据用户风险偏好、投资目标和市场条件推荐合适的 KuCoin Earn 理财产品
# 等价于 DAG 编排:
#   task_1: recommend_financial_product (调用 MCP 获取匹配产品列表)
#   回复使用 recommend_financial_product prompt (4段式结构 + 可交互表格)
#
# 输出: 投资目标摘要 → 产品说明 → 可交互申购表格 → 风险提醒

name: smart_earn

summary: >-
  Recommends suitable KuCoin Earn financial products by analyzing user risk
  profile, investment preferences, and market conditions.
  Use for queries like: "推荐理财产品" / "高收益产品" / "earn product" /
  "staking recommendations" / "how to invest $500" / "低风险理财" /
  "什么产品年化高" / "活期理财推荐".

description: >-
  Recommend financial products from KuCoin Earn by:
  1. Analyzing user risk tolerance and investment goals from the query
  2. Calling recommend_financial_product to get matched products
  3. Presenting results in a 4-section response with an interactive table

  HARD CONSTRAINT (MANDATORY):
  If this skill is selected, you MUST create a task for
  recommend_financial_product. The tool handles all filtering logic internally.

sub_tools:
  - recommend_financial_product

parameters:
  - name: token
    type: string
    required: false
    description: "Cryptocurrency filter (e.g., BTC, ETH, USDT)"
  - name: product
    type: string
    required: false
    description: "Product type filter. Valid values: RANGE_BOUND, LOCKDROP, DUAL, PROTECTIVE_EARN, CONVERT_PLUS, VOTE, DEMAND, FUTURE_PLUS, MINING_POOL, DUAL_BOOSTER, KCS_STAKING, SHARKFIN, TWIN_WIN, SHARKFIN_BASE, ETH2, ACTIVITY, STAKING, POLKA_FUND, DUAL_CLASSIC, DUAL_EXTRA"
  - name: risk_level
    type: string
    required: false
    description: "Risk level (C1-C5). C1=Conservative, C2=Stable, C3=Balanced, C4=Aggressive, C5=Very Aggressive"
  - name: tenor
    type: number
    required: false
    description: "Lock period in days. 0 for flexible/demand products"
  - name: apy
    type: number
    required: false
    description: "Target annualized yield percentage (0-100)"

response_prompt_name: recommend_financial_product
