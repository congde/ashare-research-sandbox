server_name: ai-web3-tradding-agent
server_host: 0.0.0.0
server_port: 10240

business_line: kia

# 日志
log_path: /var/log/kucoin/ai-web3-tradding-agent

# Apollo的应用ID
apollo_id: ai-web3-tradding-agent

# 网关
eureka_server: http://eureka-risk.kucoin:1111/eureka/
eureka_username:
eureka_password:

# 白名单
white_list:

# API鉴权
enable_auth: true
securekey:

# --- TradingAgents (TauricResearch) — when true, DeepThink plan-mode uses TradingAgentsGraph
# instead of the MCP tool DAG. Requires: pip install -r requirements.txt (vendored tradingagents, see vendor/TradingAgents).
# Data source: all = ValueScan + KuCoin 全量接入（工具内多 operation）；kucoin = 精简子集；upstream = yfinance（对照用）
use_trading_agents: true
trading_agents_data_source: all
# When non-empty, only if Phase-1 selected primary_intent is in this list (e.g. get_crypto_market_data)
trading_agents_allowed_intents: []
# Analyst nodes. Default omits "fundamentals" for typical crypto; Kucoin mode maps fundamentals to on-chain/flow.
trading_agents_selected_analysts: ["market", "social", "news"]
# Cap debate rounds (maps to max_debate_rounds / max_risk_discuss_rounds in upstream config)
trading_agents_max_debate_rounds: 1
trading_agents_max_risk_discuss_rounds: 1
# Log LLM/chain callback events for TradingAgents
trading_agents_trace_llm: true

# OpenAI API配置
use_azure_openai: false
openai_api_key:
openai_api_base: https://litellm-ali.sit.kucoin.net
llm_model_name: Qwen3.5-27B
# llm_model_name: Qwen3-14B-SGL
llm_stream_timeout: 1800
llm_api_timeout: 30
# 深度分析「LLM 综合信号」单次调用超时时长（秒），超时后回退规则引擎，避免一直停在「分析中」
llm_signal_timeout: 300
# LLM 信号 / TradingAgents 辩论前：跑注册表内全部策略回测并注入上下文
llm_signal_backtest_enabled: true
llm_signal_backtest_kline_type: 1hour
llm_signal_backtest_limit: 300
llm_signal_backtest_stop_loss: 3.0
llm_signal_backtest_take_profit: 5.0
llm_signal_backtest_trailing_stop: 0
llm_signal_backtest_max_hold_bars: 0
# 入场门禁 G1: 15m+1h+4h+1d 四周期同向 + LLM 为 BUY/SELL；G2: 量化软否决；G3: 可执行
five_signal_news_gate_hours: 12
live_entry_gate_mode: llm_mtf
live_entry_gate_min_tf_aligned: 4
live_entry_gate_quant_veto: true
live_entry_gate_min_rr: 1.5
live_entry_gate_min_confidence: 50
live_entry_gate_require_backtest_ok: true
live_entry_gate_funding_cap: 0.0008
hybrid_arena_match_mode: gate_only
# 实盘 / LLM 信号：补充 REST 实时盘口、合约标记价与短周期 K 线（1m/5m，非 WebSocket）
live_realtime_enabled: true
live_realtime_kline_timeframes: "1min,5min"
# 将 L1 现价写入未收盘 K 线的 close/high/low（亚分钟刷新 RSI/趋势等）
live_realtime_kline_merge_timeframes: "1min,5min,15min"
# 做空入场：1m/5m/15m 短周期 timing（贴支撑反弹 → 等待阻力；破位动能 → 可追空）
live_short_term_timing_enabled: true
# 实盘 / LLM 信号：接入 src/factors 量化因子管线（ValueScan + KuCoin）
live_quant_factors_enabled: true
live_quant_factors_market: contract
live_quant_factors_timeout_s: 45
live_quant_factors_min_aggregate: 0.12
live_quant_factors_require_align: false
# 合约实盘：按信号 tradePlan 入场区间 / 止损 / 目标执行
live_trade_plan_strict: true
live_trade_plan_entry_tolerance_pct: 0.15
live_trade_plan_enforce_stop: true
live_trade_plan_enforce_targets: true
# 持仓浮亏超阈值自动平仓（相对开仓价或 ROE，%）
live_max_unrealized_loss_pct: 30
llm_followup_timeout: 30

# OpenSearch / Embedding 配置
opensearch_url:
opensearch_host:
opensearch_port: 443
opensearch_user:
opensearch_password:
opensearch_index: market_events
opensearch_news_index: non_market_events
opensearch_use_ssl: true
opensearch_verify_certs: false
opensearch_vector_field: event_embedding
opensearch_text_fields: title,headline,summary,statement,content,event_statement_template,event_question_template
opensearch_event_time_field: timestamps.storage_time
opensearch_max_event_age_hours: 72
embedding_model: Qwen3-Embedding-0.6B
embedding_dims: 1024
embedding_openai_api_key:
embedding_openai_api_base:

# 交易风控阈值，可由 Apollo 或环境变量覆盖（以下为 Agent Arena 实盘默认值）
quant_max_position_risk: 0.50
quant_max_total_exposure: 0.50
quant_max_daily_loss: 0.05
quant_max_drawdown: 0.15
quant_min_confidence: 0.60
quant_max_leverage: 5
quant_max_quantity_usd: 100.0
quant_scheduler_mode: arena
quant_scheduler_enabled: false
quant_scheduler_interval_seconds: 3600
quant_scheduler_symbols: BTC
quant_scheduler_execute: false
quant_scheduler_dry_run: true
quant_scheduler_confirmation:
quant_scheduler_include_account: true
quant_scheduler_include_rag: false

# KuCoin 凭证：仅通过 .env / Apollo 注入（KUCOIN_API_KEY、KUCOIN_ACCOUNT_{ID}_*）

# -----------------------------------------------------------------
# Agent Arena — Dashboard 实盘定时决策（不包含任何交易所密钥）
# default.yaml 会在应用初始化时同步为同名大写环境变量；Dashboard payload 可覆盖这些默认值。
# -----------------------------------------------------------------
# 实盘部署：true 自动切 paper_only=false、execute=true、dry_run=false、CONFIRM。
quant_arena_live: true
quant_arena_confirmation: CONFIRM
quant_arena_agents: technical_signal,claude_agent
quant_arena_execution_agents: technical_signal,claude_agent
quant_arena_symbols: BTC
quant_arena_quote: USDT
quant_arena_interval_seconds: 3600
quant_arena_max_rounds: 0
quant_arena_deepseek_model: deepseek-chat
quant_arena_deepseek_fallback_model: Qwen3.5-27B
quant_arena_default_model: deepseek-chat
# 留空即可；technical_signal/claude_agent 的账号默认分别映射到同名 account_id。
quant_arena_agent_configs: ""
quant_arena_agent_timeout_seconds: 90
quant_live_max_order_usd: 100
quant_require_protective_orders: false

# 深度研究
deep_research_url: http://127.0.0.1:3051
deep_research_server: ai-deep-research
deep_research_securekey:
disable_query_clarify: false

# 记忆系统
memory_url: http://localhost:8888
memory_server: ai-memo
memory_securekey:

# MCP Client
mcp_client_server: DC-QINGNIAO-MCPSERVER
mcp_project_id: 3
mcp_list_tools_interval: 60
mcp_list_prompts_interval: 60
mcp_client_securekey:

# 数据回传
dc_kia_qingniao_server:
  server_name: DC-KIA-QINGNIAO-SERVER
  securekey:

# kcbot服务对
kcbot_server:
  server_name: INTELLIGENT-BOT-SERVER
  securekey:

# 组件
component:
  mongo:
    (): dao.mongo.MongodbClient
    url: mongodb://{username}:{password}@10.40.64.98:27017/admin?authSource=admin&directConnection=true&retryWrites=false&minPoolSize=10&maxPoolSize=50
    username: ai_kia
    password:
    # replicaSet:
    # readPreference:

  redis:
    (): dao.cache.redis.RedisClient
    read_model: "SLAVE"
    cluster_mode: true   # 单节点也是 Cluster 时需用 Cluster 客户端，否则会 MovedError
    max_connections: 50
    password:
    nodes:
      - host: redis-1.kucoin
        port: 7000


# 风控总开关：false 时关闭远程风控、本地敏感词、流式输出检测、URL 风控、欢迎语检测等（本版本默认关）
risk_control_enabled: false

# 风控模型（仅当 risk_control_enabled 为 true 时生效）
risk_enable: false
risk_url: https://kia-security-fence.dc.kcprd.com
risk_timeout: 5
risk_app_id:
risk_api_key:
risk_max_connections: 150
risk_keepalive_expiry: 30

# 本地风控
# 1=拦截critical及以上, 2=拦截high及以上, 3=拦截medium及以上, 4=拦截所有(包括low)
local_risk_threshold: 3  

# URL风控独立配置
url_risk_enable: false
url_risk_api_url:
url_risk_api_key:
# 风控API超时连接时间
url_risk_timeout: 5
# 离线黑名单文件路径
url_risk_blacklist_path: conf/domain_blacklist/domain_blacklist.json
# 是否拦截灰色(gray)等级的URL (true=拦截black+gray, false=仅拦截black), 非严格风控建议选择false
url_risk_block_gray: true  


# 断点续传
resume_config:
  ttl: 600
  redis_list:
    enable_debug_logger: false
  redis_session:
    ttl: 3600

# Azure AI Search
azure_search_endpoint:
azure_search_api_key:
azure_search_index_name:

# 思考质量 - 节点关键性门控 (Inspired by "Think Deep, Not Just Long", Google 2026)
# 所有开关默认关闭，通过 Apollo 热配置开启
thinking_quality:
  enable_criticality_gating: false
  critical_task_max_retries: 1
  critical_task_retry_delay_s: 0.5

# 上下文管理 - OpenClaw-inspired transcript + compaction
# enable: 总开关，false = 退回到原有 _history_to_messages 逻辑
context:
  enable: true
  model_context_window: 32000
  reserved_for_output: 8000
  reserved_for_system: 4000
  compaction_threshold: 0.7
  recent_window: 6
  flush_before_compact: true
  # 工具返回结果最大字符数（防止单个工具返回撑爆上下文窗口）
  tool_result_max_chars: 10000

welcome_recommend_api_url:
ms_token_public_key:

# 对话/DAG 仅允许以下工具取数（空列表或未设置 = 不限制）
# 含 web_search、ValueScan、KuCoin 公开 API 与 MCP 行情类工具；direct_response 为虚拟工具（仅无需外部数据时）
agent_allowed_tools:
  - web_search
  - valueScan_api
  - dexScan_api
  - kucoin_openapi_public
  - get_crypto_market_data
  - get_crypto_investment_outlook
  - coin_screener
  - direct_response

# 仅参与 DAG 选型的技能（空列表或未设置 = 不限制）；与 conf/skills 中 YAML 的 name 一致
agent_allowed_skills:
  - valueScan
  - dexScan


# DeepSeek: base_url 不变；model 使用 deepseek-v4-pro 或 deepseek-v4-flash（Chat Completions）
# api_key 通过 LLM_PROVIDERS_DEEPSEEK_API_KEY（.env / Apollo）注入，不在代码中硬编码
deepseek:
  base_url: https://api.deepseek.com/v1
  api_key:
  model: deepseek-v4-flash

llm_providers:
  deepseek:
    base_url: https://api.deepseek.com/v1
    api_key:
    model: deepseek-v4-flash
  qwen:
    api_key: 
    base_url: https://litellm-ali.sit.kucoin.net
    model: Qwen3.5-27B


vs_open_api_key:
vs_open_secret_key:
vs_open_api_base_url:
valuescan_http_proxy:
valuescan_https_proxy:

# ValueScan 常驻 SSE（大盘 + 代币信号推送，供 LLM/实盘控制台读取缓存）
vs_sse_worker_enabled: true
vs_sse_watch_symbols: "BTC,ETH,HYPE,SOL"
vs_sse_reconnect_sec: 5
vs_sse_watch_refresh_sec: 90
vs_sse_max_events_per_token: 30

# DexScan DEX 数据 API（https://web3-dexscan.gitbook.io/api）
# 鉴权：.env 中 DEX_API_KEY / DEXSCAN_API_KEY
dexscan_api_base_url: https://kcapi.dexscan.trade